{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-xl-10">
    <!-- IA removed per project configuration -->

    <!-- Formulario manual de asientos -->
    <div class="card shadow-sm border-0">
      <div class="card-header bg-white border-0 py-3">
        <h2 class="h4 mb-0">Nuevo asiento contable</h2>
        <p class="text-muted mb-0">O ingresa los movimientos manualmente con partida doble.</p>
      </div>
      <div class="card-body">
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" action="/asientos" id="asientoForm">
          <div class="row g-3 mb-3">
            <div class="col-md-3">
              <label class="form-label">Fecha</label>
              <input type="date" name="fecha" class="form-control" value="{{ hoy }}" required>
            </div>
            <div class="col-md-5">
              <label class="form-label">Descripción</label>
              <input type="text" name="descripcion" class="form-control" placeholder="Describe el asiento" required>
            </div>
            <div class="col-md-2">
              <label class="form-label">Fuente</label>
              <input type="text" name="fuente" class="form-control" value="MANUAL">
            </div>
            <div class="col-md-2">
              <label class="form-label">Creado por</label>
              <input type="text" name="creado_por" class="form-control" value="USUARIO">
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-2">
            <h3 class="h5 mb-0">Movimientos</h3>
            <button class="btn btn-outline-primary btn-sm" type="button" onclick="addMovimientoRow()">
              <i class="bi bi-plus-circle"></i> Agregar línea
            </button>
          </div>

          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th style="width: 24%">Cuenta</th>
                  <th>Descripción</th>
                  <th style="width: 15%">Debe</th>
                  <th style="width: 15%">Haber</th>
                  <th style="width: 5%"></th>
                </tr>
              </thead>
              <tbody id="movimientosBody">
                <tr class="movimiento-row">
                  <td>
                    <select name="codigo_cuenta" class="form-select" required>
                      <option value="">Seleccionar</option>
                      {% for cuenta in catalogo %}
                      <option value="{{ cuenta.codigo }}">{{ cuenta.codigo }} - {{ cuenta.nombre }}</option>
                      {% endfor %}
                    </select>
                  </td>
                  <td><input type="text" name="descripcion_linea" class="form-control" placeholder="Descripción"></td>
                  <td><input type="number" step="0.01" min="0" name="debe" class="form-control text-end" placeholder="0.00"></td>
                  <td><input type="number" step="0.01" min="0" name="haber" class="form-control text-end" placeholder="0.00"></td>
                  <td><button class="btn btn-sm btn-outline-danger" type="button" onclick="removeMovimientoRow(this)">×</button></td>
                </tr>
                <tr class="movimiento-row">
                  <td>
                    <select name="codigo_cuenta" class="form-select" required>
                      <option value="">Seleccionar</option>
                      {% for cuenta in catalogo %}
                      <option value="{{ cuenta.codigo }}">{{ cuenta.codigo }} - {{ cuenta.nombre }}</option>
                      {% endfor %}
                    </select>
                  </td>
                  <td><input type="text" name="descripcion_linea" class="form-control" placeholder="Descripción"></td>
                  <td><input type="number" step="0.01" min="0" name="debe" class="form-control text-end" placeholder="0.00"></td>
                  <td><input type="number" step="0.01" min="0" name="haber" class="form-control text-end" placeholder="0.00"></td>
                  <td><button class="btn btn-sm btn-outline-danger" type="button" onclick="removeMovimientoRow(this)">×</button></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <button type="submit" class="btn btn-primary">Guardar asiento</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // Reference al token CSRF (si lo hay) e información del catálogo
  const catalogo = {{ catalogo | tojson }};
  const cuentasPorCodigo = {};
  catalogo.forEach(c => {
    cuentasPorCodigo[c.codigo] = c.nombre;
  });
  // IA features removed; only keep form helpers below

  function addMovimientoRow() {
    const tbody = document.getElementById('movimientosBody');
    const row = document.createElement('tr');
    row.className = 'movimiento-row';
    row.innerHTML = `
      <td>
        <select name="codigo_cuenta" class="form-select" required>
          <option value="">Seleccionar</option>
          ${catalogo.map(c => `<option value="${c.codigo}">${c.codigo} - ${c.nombre}</option>`).join('')}
        </select>
      </td>
      <td><input type="text" name="descripcion_linea" class="form-control" placeholder="Descripción"></td>
      <td><input type="number" step="0.01" min="0" name="debe" class="form-control text-end" placeholder="0.00"></td>
      <td><input type="number" step="0.01" min="0" name="haber" class="form-control text-end" placeholder="0.00"></td>
      <td><button class="btn btn-sm btn-outline-danger" type="button" onclick="removeMovimientoRow(this)">×</button></td>
    `;
    tbody.appendChild(row);
  }

  function removeMovimientoRow(btn) {
    btn.closest('tr').remove();
  }
</script>
{% endblock %}
