<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Sistema Contable' }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-soft">
<nav class="navbar navbar-expand-lg navbar-dark bg-navy shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-semibold" href="{{ '/' if authenticated else '/login' }}">Sistema Contable</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample" aria-controls="navbarsExample" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarsExample">
      {% if authenticated %}
      <ul class="navbar-nav ms-auto gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="/asientos/nuevo">Nuevo asiento</a></li>
        <li class="nav-item"><a class="nav-link" href="/catalogo">Catálogo</a></li>
        <li class="nav-item"><a class="nav-link" href="/diario">Diario</a></li>
        <li class="nav-item"><a class="nav-link" href="/mayor">Mayor</a></li>
        <li class="nav-item"><a class="nav-link" href="/balanza">Balanza</a></li>
        <li class="nav-item"><a class="nav-link" href="/estado-resultados">Estado resultados</a></li>
        <li class="nav-item"><a class="nav-link" href="/balance-general">Balance general</a></li>
        <li class="nav-item"><span class="nav-link disabled">{{ current_user }}</span></li>
        <li class="nav-item"><a class="nav-link" href="/logout">Salir</a></li>
      </ul>
      {% else %}
      <ul class="navbar-nav ms-auto gap-lg-2">
        <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="/signup">Registro</a></li>
      </ul>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
