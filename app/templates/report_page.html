{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm border-0">
  <div class="card-body">
    <h2 class="h4 mb-4">{{ heading }}</h2>
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            {% for column in columns %}
            <th>{{ column.replace('_', ' ')|title }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            {% for column in columns %}
            <td>{{ row[column] }}</td>
            {% endfor %}
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
